<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Neftaly — Tropa Scout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="css/app.css" rel="stylesheet">
  <script src="js/config.js"></script>
</head>
<body>

<!-- Login -->
<div id="login-screen" class="min-vh-100 d-flex align-items-center justify-content-center p-3">
  <div class="card shadow-sm w-100" style="max-width:400px">
    <div class="card-body p-4">
      <h1 class="h4 text-center mb-1"><i class="fa-solid fa-campground text-primary"></i> Neftaly</h1>
      <p class="text-center text-muted small mb-4">Gestión de tropa</p>
      <form id="login-form">
        <div class="mb-3">
          <label class="form-label" for="login-email">Correo</label>
          <input type="email" class="form-control" id="login-email" required autocomplete="username">
        </div>
        <div class="mb-3">
          <label class="form-label" for="login-password">Contraseña</label>
          <input type="password" class="form-control" id="login-password" required autocomplete="current-password">
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="login-remember" checked>
          <label class="form-check-label" for="login-remember">Recordar en este dispositivo</label>
        </div>
        <div id="login-error" class="alert alert-danger d-none py-2"></div>
        <button type="submit" class="btn btn-primary w-100">Entrar</button>
      </form>
    </div>
  </div>
</div>

<!-- App -->
<div id="app-shell">
  <nav class="navbar navbar-dark bg-primary sticky-top">
    <div class="container-fluid">
      <button class="btn btn-link text-white px-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvas-nav">
        <i class="fa-solid fa-bars fa-lg"></i>
      </button>
      <span class="navbar-brand mx-auto">Neftaly</span>
      <span class="badge bg-light text-primary" id="ciclo-badge">Ciclo 2</span>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvas-nav">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Menú</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body offcanvas-nav">
      <p class="small text-muted mb-2" id="user-display-name"></p>
      <nav class="nav flex-column gap-1">
        <a class="nav-link active" href="#" data-view="resumen"><i class="fa-solid fa-house me-2"></i> Resumen</a>
        <a class="nav-link" href="#" data-view="asistencia"><i class="fa-solid fa-clipboard-check me-2"></i> Asistencia</a>
        <a class="nav-link d-none" href="#" data-view="config" id="nav-config"><i class="fa-solid fa-gear me-2"></i> Configuración</a>
        <a class="nav-link" href="#" data-view="reportes"><i class="fa-solid fa-chart-bar me-2"></i> Reportes</a>
        <hr>
        <a class="nav-link" href="#" data-view="log"><i class="fa-solid fa-list me-2"></i> Registro</a>
        <button class="btn btn-outline-secondary mt-3" id="btn-logout"><i class="fa-solid fa-right-from-bracket me-1"></i> Salir</button>
      </nav>
    </div>
  </div>

  <main class="container-fluid py-3 px-3" style="max-width:720px">
    <section id="view-resumen" class="view-section active"></section>
    <section id="view-asistencia" class="view-section"></section>
    <section id="view-config" class="view-section"></section>
    <section id="view-reportes" class="view-section"></section>
    <section id="view-log" class="view-section"></section>
  </main>
</div>

<!-- Modal puntos patrulla -->
<div class="modal fade" id="modal-puntos-patrulla" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header add-points">
        <h5 class="modal-title">Puntos patrulla</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Patrulla</label>
          <select class="form-select" id="ppt-patrulla"></select>
        </div>
        <div class="mb-3">
          <label class="form-label">Puntos</label>
          <input type="number" class="form-control" id="ppt-cantidad" min="1" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Nota (opcional)</label>
          <input type="text" class="form-control" id="ppt-nota">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="ppt-submit">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal puntos miembro -->
<div class="modal fade" id="modal-puntos-miembro" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header add-points">
        <h5 class="modal-title">Puntos personales</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Área de crecimiento</label>
          <select class="form-select" id="pmb-area"></select>
        </div>
        <div class="mb-3">
          <label class="form-label">Puntos</label>
          <input type="number" class="form-control" id="pmb-cantidad" min="1" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Nota (opcional)</label>
          <input type="text" class="form-control" id="pmb-nota">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="pmb-submit">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
  import { initAuth } from './js/auth.js';
  import { initApp } from './js/app.js';

  const cfg = window.NEFTALY_CONFIG;
  if (!cfg?.supabaseUrl || !cfg?.supabaseAnonKey) {
    document.body.innerHTML = '<div class="alert alert-danger m-4">Falta <code>js/config.js</code>. Copia <code>config.example.js</code> y agrega tus credenciales de Supabase.</div>';
    throw new Error('Missing config');
  }

  window.supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
  });

  initAuth().then(() => initApp());
</script>
</body>
</html>
